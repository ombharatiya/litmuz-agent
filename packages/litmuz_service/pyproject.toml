[project]
name = "litmuz-service"
version = "0.0.0"
description = "Litmuz application-service layer: submit and run verification jobs."
requires-python = ">=3.11"
dependencies = [
    "litmuz-core",
    "litmuz-store",
]

[tool.uv.sources]
litmuz-core = { workspace = true }
litmuz-store = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/litmuz_service"]
