[project]
name = "litmuz-core"
version = "0.0.0"
description = "Litmuz pipeline core: claim-level verification for life-sciences research agents."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/litmuz_core"]
