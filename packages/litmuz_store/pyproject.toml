[project]
name = "litmuz-store"
version = "0.0.0"
description = "Litmuz provenance store: append-only persistence over PostgreSQL."
requires-python = ">=3.11"
dependencies = [
    "litmuz-core",
    "psycopg[binary]>=3.1",
]

[tool.uv.sources]
litmuz-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/litmuz_store"]
